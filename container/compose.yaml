# Containerised P4 tooling — the fast path next to `vm/`.
#
# This is NOT a replacement for vm/. See ARCHITECTURE.md §6 for what each gives
# you and how they differ; the short version is that vm/ has mininet and a real
# 4-switch topology, and this has a single bare switch you can reach on
# localhost:9559 without VirtualBox.
#
# Apple's `container` has no compose support (`container compose` -> "Plugin
# 'container-compose' not found"), so this file is Docker-only. `./p4rt.sh`
# does the same thing on either runtime — prefer it if you use both.
#
#   docker compose up -d bmv2                    # a switch on localhost:9559
#   docker compose --profile tools run --rm p4c  # regenerate the p4info fixtures
#   docker compose --profile vm    run --rm p4c-vm  # ...with the VM's p4c

services:
  # simple_switch_grpc with no pipeline loaded. Enough to exercise the
  # P4Runtime wire (Bmv2WireSuite); not enough for table entries, because
  # P4R-Type cannot push a pipeline config (UPGRADE.md §8.11).
  bmv2:
    image: p4lang/behavioral-model:latest
    # p4lang publishes linux/amd64 only. Native on GitHub runners; emulated on
    # Apple silicon (slow first start, then fine).
    platform: linux/amd64
    container_name: p4rt-bmv2
    # The `--` is load-bearing: --grpc-server-addr is a target-specific option.
    # Without it bmv2 prints usage and exits — while the published port still
    # accepts connections, so a port check will lie to you.
    command: ["simple_switch_grpc", "--no-p4", "--", "--grpc-server-addr", "0.0.0.0:9559"]
    ports:
      - "9559:9559"
    healthcheck:
      # Ask the service, not the runtime: a running container is not a working
      # switch. `-d`/`up -d` returns well before gRPC is listening.
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/9559' 2>/dev/null || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 3s

  # One-shot: recompile the .p4 fixtures and refresh their p4info.
  #
  # PINNED to the same tag as ci.yml and p4rt.sh. The tag lives in FOUR files —
  # this one, .github/workflows/ci.yml, container/p4rt.sh, and (as prose)
  # README.md — and they must move together. This service writes the committed
  # fixtures *directly*, so on a different p4c it silently replaces them with
  # output from a version CI does not use, and the pinned CI job then fails with
  # a diff whose real cause is the regeneration tool, not the .p4. It was left on
  # `latest` when the other two were pinned, which is exactly that hazard:
  # `latest` was broken at the time (see ci.yml), so this path was unrunnable.
  #
  # It regenerates exactly the two *generated* fixtures —
  # quackmpp_exchange.p4info.json and matchkinds.p4info.json — each from its .p4.
  # NOTE the sibling src/test/resources/legacy_actionprofile.p4info.json is NOT
  # in this set: it is hand-written, has no .p4, and encodes a pre-v1.4.0 shape
  # modern p4c cannot emit (QuackMppTypegenSuite reads it to assert rejection).
  # Regenerating it would destroy that test — do not add it here.
  #
  # This (source, fixture) list is duplicated in ci.yml's PAIRS and in
  # `p4rt.sh gen`; adding a third .p4 means editing all three, and nothing
  # detects divergence (that is how matchkinds was wired into two of three).
  # Keep the three in sync. matchkinds.p4 was added after this service and left
  # out here, so a Docker user could refresh one of two and leave the other stale.
  p4c:
    image: p4lang/p4c:1.2.5.15
    platform: linux/amd64
    profiles: ["tools"]
    volumes:
      - ../P4R-Type:/proj
    working_dir: /proj/examples/src/main/p4
    command:
      - sh
      - -c
      - |
        set -e
        for p4 in quackmpp:quackmpp_exchange matchkinds:matchkinds; do
          src="$${p4%%:*}.p4"; fixture="$${p4##*:}.p4info.json"
          p4c --target bmv2 --arch v1model \
              --p4runtime-files "/proj/src/test/resources/$$fixture" \
              -o /tmp "$$src"
          echo "refreshed src/test/resources/$$fixture"
        done
        echo "with $$(p4c --version | head -1)"
        echo "now run on the host, from the repo root: container/p4rt.sh gen-types"

  # The p4c the mininet VM actually ships (vm/ installs p4lang-p4c 1.2.4.2 from
  # the home:p4lang OBS repo; 1.2.4.3 is the closest published image).
  #
  # Use this to check the fixture against VM-era output. Known and verified: it
  # does NOT emit `initialDefaultAction`, so its p4info differs from the
  # committed fixture — but typegen ignores that field, so the *generated types*
  # are byte-identical either way. See ARCHITECTURE.md §6.
  p4c-vm:
    image: p4lang/p4c:1.2.4.3
    platform: linux/amd64
    profiles: ["vm"]
    volumes:
      - ../P4R-Type/examples/src/main/p4:/w
    working_dir: /w
    command:
      - sh
      - -c
      - |
        p4c --target bmv2 --arch v1model \
            --p4runtime-files /w/quackmpp.vm-era.p4info.json -o /tmp /w/quackmpp.p4 &&
        echo "wrote quackmpp.vm-era.p4info.json with $$(p4c --version | head -1)"

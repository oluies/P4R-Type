# Scala Steward configuration for P4R-Type.
# See UPGRADE.md for why several artifacts are pinned to pre-release versions.

# The sbt build is in P4R-Type/, not the repo root. Without this, Steward finds
# no build and silently does nothing.
buildRoots = [ "P4R-Type" ]

pullRequests.frequency = "7 days"

commits.message = "deps: update ${artifactName} ${currentVersion} -> ${nextVersion}"

# This project intentionally tracks Scala Next (latest 3.x), not the 3.3 LTS,
# because QuackMPP's toolchain baseline is Scala Next. Do not pin to 3.3.x.

updates.pin = [
  # ScalaPB 0.11.x cannot be used under sbt 2: compilerplugin_3 0.11.x depends on
  # protoc-gen_2.13 -> protoc-bridge_2.13, which collides with sbt-protoc's
  # protoc-bridge_3. Only the 1.0.0-alpha line (alpha.5+) uses protoc-gen_3, so
  # hold ScalaPB there rather than let Steward "upgrade" us onto 0.11.20, which
  # sorts higher but does not resolve. See UPGRADE.md §3.
  { groupId = "com.thesamet.scalapb", artifactId = "compilerplugin",  version = "1.0.0-alpha." },
  { groupId = "com.thesamet.scalapb", artifactId = "scalapb-runtime", version = "1.0.0-alpha." },
  { groupId = "com.thesamet.scalapb", artifactId = "scalapb-runtime-grpc", version = "1.0.0-alpha." }
]

updates.ignore = [
  # zio-grpc has no sbt 2 compatible codegen release: the newest
  # (zio-grpc-codegen 0.6.3) pins scalapb compilerplugin 0.11.14, which drags
  # in protoc-bridge_2.13 and conflicts with sbt-protoc's sbt2 build
  # (protoc-bridge_3). The dependency is currently removed from the build.
  # Re-evaluate manually rather than letting Steward reintroduce it.
  { groupId = "com.thesamet.scalapb.zio-grpc" }
]

# NOTE: the pins above are prefix pins, so Steward will still move
# 1.0.0-alpha.6 -> 1.0.0-alpha.7 etc. When ScalaPB 1.0.0 goes final, drop the
# pins by hand — that, plus sbt-protoc 1.1.0 final (unpinned, so Steward will
# offer it), is the exit from the last pre-release versions. See UPGRADE.md §3.

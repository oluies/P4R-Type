name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['25']

    defaults:
      run:
        working-directory: P4R-Type

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      # sbt 2 joins bare CLI args into a single command line, so multiple
      # commands must be quoted and separated with ';'.
      # `testFull` (not `test`) is required: sbt 2's `test` is incremental and
      # will report success having run zero tests.
      - name: Compile and test
        run: sbt -batch "compile; Test/compile; testFull"

      # Run typegen to files and check its exit status, rather than piping it
      # straight into sed: otherwise a genuine failure (compile error, missing
      # fixture, parseP4info throwing) produces no 'package quackmpp' line and
      # gets misreported as drift with the real error discarded.
      #
      # stdout and stderr are kept SEPARATE and only stdout is parsed. The JVM
      # writes sun.misc.Unsafe terminal-deprecation warnings to stderr (4 of them
      # on JDK 25, from scala.runtime.LazyVals$ / protobuf-java / netty), emitted
      # lazily on first use and not [info]-prefixed. Merging the streams would let
      # any that fire after the first 'package' line be baked into the compared
      # output and surface as a bogus drift failure.
      - name: Verify typegen against the v1model p4info fixture
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          if ! sbt -batch "runMain parseP4info src/test/resources/quackmpp_exchange.p4info.json quackmpp" \
               > "$tmp/typegen.out" 2> "$tmp/typegen.err"; then
            echo "::error::typegen failed to run. stdout then stderr follow:"
            cat "$tmp/typegen.out" "$tmp/typegen.err"
            exit 1
          fi
          sed -n '/^package quackmpp/,$p' "$tmp/typegen.out" \
            | sed '/^\[success\]/,$d' | sed '/^\[info\]/d' > "$tmp/regenerated.scala"
          if [ ! -s "$tmp/regenerated.scala" ]; then
            echo "::error::typegen produced no output. stdout then stderr follow:"
            cat "$tmp/typegen.out" "$tmp/typegen.err"
            exit 1
          fi
          if ! diff -u src/test/scala/quackmpp_exchange.scala "$tmp/regenerated.scala"; then
            echo "::error::typegen output drifted from the committed quackmpp_exchange.scala. Regenerate it."
            exit 1
          fi

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['25']

    defaults:
      run:
        working-directory: P4R-Type

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      # sbt 2 joins bare CLI args into a single command line, so multiple
      # commands must be quoted and separated with ';'.
      # `testFull` (not `test`) is required: sbt 2's `test` is incremental and
      # will report success having run zero tests.
      - name: Compile and test
        run: sbt -batch "compile; Test/compile; testFull"

      # Run typegen into a log first and check its exit status, rather than
      # piping it straight into sed: otherwise a genuine failure (compile error,
      # missing fixture, parseP4info throwing) produces no 'package quackmpp'
      # line, and the drift check reports it as "drift" while discarding the
      # actual error.
      - name: Verify typegen against the v1model p4info fixture
        run: |
          set -euo pipefail
          if ! sbt -batch "runMain parseP4info src/main/scala/examples/quackmpp_exchange.p4info.json quackmpp" \
               > typegen.log 2>&1; then
            echo "::error::typegen failed to run. Output follows:"
            cat typegen.log
            exit 1
          fi
          sed -n '/^package quackmpp/,$p' typegen.log | sed '/^\[success\]/,$d' | sed '/^\[info\]/d' > regenerated.scala
          if [ ! -s regenerated.scala ]; then
            echo "::error::typegen produced no output. Full log:"
            cat typegen.log
            exit 1
          fi
          if ! diff -u src/main/scala/examples/quackmpp_exchange.scala regenerated.scala; then
            echo "::error::typegen output drifted from the committed quackmpp_exchange.scala. Regenerate it."
            exit 1
          fi

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['25']

    defaults:
      run:
        working-directory: P4R-Type

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      # sbt 2 joins bare CLI args into a single command line, so multiple
      # commands must be quoted and separated with ';'.
      # `testFull` (not `test`) is required: sbt 2's `test` is incremental and
      # will report success having run zero tests.
      # `examples/compile` is explicit: the examples are a separate project that
      # root deliberately does not aggregate (see build.sbt), so a bare `compile`
      # would not build them and CI would miss breakage there.
      - name: Compile and test
        run: sbt -batch "compile; Test/compile; testFull; examples/compile"

      # The typegen drift check used to live here as a shell pipeline that ran
      # `runMain parseP4info`, sed'd the types out of sbt's log and diffed them.
      # It is now QuackMppTypegenSuite's "typegen output matches the committed
      # quackmpp_exchange.scala" test, which calls the `generate` library entry
      # point directly — so `testFull` above covers it, with no log parsing and
      # no ANSI/stderr contamination to worry about.

  # The p4info fixture the tests run against is committed so the suite stays fast
  # and container-free. This job is what keeps that commit honest: it recompiles
  # examples/src/main/p4/quackmpp.p4 with real p4c and fails if the emitted
  # p4info has drifted from the committed copy — e.g. because a newer p4c emits a
  # field we do not model yet. (`initialDefaultAction` was exactly such a
  # surprise: p4c emits it and a hand-written fixture had no way to know.)
  p4info-fixture:
    name: p4info fixture matches real p4c
    runs-on: ubuntu-latest

    # NOT a `container:` job, deliberately. p4lang/p4c ships no git, so
    # actions/checkout inside it cannot clone and falls back to downloading the
    # repo tarball over REST — which failed 3 runs out of 4 with GitHub's HTML
    # error page ("Downloading the archive" -> <!DOCTYPE html>). Checking out on
    # the runner (which has git) and invoking p4c via `docker run` keeps the
    # fragile path out of the loop entirely, and mirrors what container/p4rt.sh
    # does locally.
    steps:
      - uses: actions/checkout@v7

      # p4lang publishes linux/amd64 only; ubuntu-latest is amd64, so this runs
      # natively. On an arm64 dev machine it needs emulation — see ARCHITECTURE.md §5.
      #
      # Every failure below names what actually failed. This job's whole lineage
      # is people being sent to fix the wrong thing: a missing fixture reported
      # as drift, then a missing file reported as drift again. So infrastructure,
      # p4c, a missing output and real drift are four distinct messages.
      - name: Recompile the P4 and compare the emitted p4info
        shell: bash
        env:
          IMAGE: p4lang/p4c:latest
          FIXTURE: P4R-Type/src/test/resources/quackmpp_exchange.p4info.json
          P4FILE: P4R-Type/examples/src/main/p4/quackmpp.p4
          # Output goes to its own directory, bind-mounted separately, so the
          # build artifact never lands in the checked-out source tree.
          OUTDIR: ${{ runner.temp }}/p4c-out
        run: |
          set -euo pipefail
          FRESH="$OUTDIR/quackmpp.p4info.json"
          mkdir -p "$OUTDIR"

          test -f "$FIXTURE" || { echo "::error::fixture missing at $(pwd)/$FIXTURE"; exit 1; }
          test -f "$P4FILE"  || { echo "::error::P4 source missing at $(pwd)/$P4FILE"; exit 1; }

          # Pull separately from the compile. `docker run` exits non-zero for a
          # pull failure or a Docker Hub rate limit just as it does for a p4c
          # error, and blaming the developer's P4 for Docker Hub being busy is
          # exactly the kind of misdirection this job keeps getting wrong.
          if ! docker pull -q "$IMAGE"; then
            echo "::error::could not pull $IMAGE — infrastructure failure, not drift."
            exit 1
          fi

          if ! docker run --rm \
                 -v "$PWD/P4R-Type:/proj:ro" -v "$OUTDIR:/out" \
                 -w /proj/examples/src/main/p4 "$IMAGE" \
                 sh -c 'p4c --target bmv2 --arch v1model --p4runtime-files /out/quackmpp.p4info.json -o /tmp quackmpp.p4'; then
            echo "::error::p4c failed to compile $P4FILE — a compile error, not drift."
            exit 1
          fi

          # p4c exiting 0 without writing the file would otherwise reach `diff`,
          # which reports "No such file or directory" — and the branch below
          # would call that drift.
          test -f "$FRESH" || { echo "::error::p4c exited 0 but wrote no p4info to $FRESH"; exit 1; }

          if ! diff -u "$FIXTURE" "$FRESH"; then
            echo "::error::p4c's p4info no longer matches the committed fixture (diff above)."
            echo "::error::Run 'container/p4rt.sh gen', then the sbt command it prints to"
            echo "::error::regenerate P4R-Type/src/test/scala/quackmpp_exchange.scala, and re-run the tests."
            exit 1
          fi
          echo "p4info fixture matches $(docker run --rm "$IMAGE" p4c --version | head -1)"

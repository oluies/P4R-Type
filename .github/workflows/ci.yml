name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['25']

    defaults:
      run:
        working-directory: P4R-Type

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      # sbt 2 joins bare CLI args into a single command line, so multiple
      # commands must be quoted and separated with ';'.
      # `testFull` (not `test`) is required: sbt 2's `test` is incremental and
      # will report success having run zero tests.
      # `examples/compile` is explicit: the examples are a separate project that
      # root deliberately does not aggregate (see build.sbt), so a bare `compile`
      # would not build them and CI would miss breakage there.
      - name: Compile and test
        run: sbt -batch "compile; Test/compile; testFull; examples/compile"

      # The typegen drift check used to live here as a shell pipeline that ran
      # `runMain parseP4info`, sed'd the types out of sbt's log and diffed them.
      # It is now QuackMppTypegenSuite's "typegen output matches the committed
      # quackmpp_exchange.scala" test, which calls the `generate` library entry
      # point directly — so `testFull` above covers it, with no log parsing and
      # no ANSI/stderr contamination to worry about.

  # The p4info fixture the tests run against is committed so the suite stays fast
  # and container-free. This job is what keeps that commit honest: it recompiles
  # examples/src/main/p4/quackmpp.p4 with real p4c and fails if the emitted
  # p4info has drifted from the committed copy — e.g. because a newer p4c emits a
  # field we do not model yet. (`initialDefaultAction` was exactly such a
  # surprise: p4c emits it and a hand-written fixture had no way to know.)
  p4info-fixture:
    name: p4info fixture matches real p4c
    runs-on: ubuntu-latest
    # p4lang publishes linux/amd64 only; ubuntu-latest is amd64, so this runs
    # natively here. On an arm64 dev machine it needs emulation — see ARCHITECTURE.md.
    container: p4lang/p4c:latest
    steps:
      - uses: actions/checkout@v7

      # `shell: bash` on purpose: inside a container job GitHub defaults to
      # `sh -e {0}`, and p4lang/p4c's sh is dash — which rejects `set -o pipefail`
      # with "Illegal option -o pipefail" before running a single line.
      #
      # Paths are relative to the workspace root — this step sets no
      # working-directory, so that is already its cwd. Two earlier versions got
      # this wrong in different ways, and both are worth not repeating:
      #
      #   `../../../` from working-directory examples/src/main/p4 is one level
      #   short of P4R-Type/, so diff never found the fixture — and reported it
      #   as *drift*, the exact misleading failure this job's predecessor was
      #   rewritten to avoid.
      #
      #   `${{ github.workspace }}` is evaluated on the host, but this is a
      #   container job: the runner mounts /home/runner/work at /__w, so host
      #   paths are not the container's paths. It happens to work (the runner
      #   translates path-valued env vars on injection), but it depends on that
      #   translation, and `${{ }}` expansion cannot be checked locally at all.
      #
      # Workspace-relative paths are immune to both.
      - name: Recompile the P4 and compare the emitted p4info
        shell: bash
        env:
          FIXTURE: P4R-Type/src/test/resources/quackmpp_exchange.p4info.json
          P4SRC: P4R-Type/examples/src/main/p4
        run: |
          set -euo pipefail

          test -f "$FIXTURE" || { echo "::error::fixture missing at $(pwd)/$FIXTURE"; exit 1; }
          test -f "$P4SRC/quackmpp.p4" || { echo "::error::P4 source missing at $(pwd)/$P4SRC"; exit 1; }

          FIXTURE="$(pwd)/$FIXTURE"   # absolute before the cd below
          cd "$P4SRC"
          if ! p4c --target bmv2 --arch v1model \
                   --p4runtime-files /tmp/fresh.p4info.json -o /tmp quackmpp.p4; then
            echo "::error::p4c failed to compile quackmpp.p4 — this is a compile error, not drift."
            exit 1
          fi

          if ! diff -u "$FIXTURE" /tmp/fresh.p4info.json; then
            echo "::error::p4c's p4info no longer matches the committed fixture (diff above)."
            echo "::error::Copy /tmp/fresh.p4info.json over src/test/resources/quackmpp_exchange.p4info.json,"
            echo "::error::regenerate src/test/scala/quackmpp_exchange.scala, and re-run the tests."
            exit 1
          fi
          echo "p4info fixture matches p4c $(p4c --version | head -1)"

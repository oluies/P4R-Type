name: Scala Steward

# Scala Steward opens PRs for dependency updates. This repo pins several
# pre-release artifacts (see UPGRADE.md); .scala-steward.conf keeps Steward
# from "helpfully" moving them onto lines that do not resolve under sbt 2.

on:
  schedule:
    # Mondays at 05:00 UTC
    - cron: '0 5 * * 1'
  workflow_dispatch:

jobs:
  scala-steward:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      # Two non-obvious things here.
      #
      # 1. No `working-directory` / `repo-config` input. The sbt build lives in
      #    P4R-Type/, not the repo root; that is expressed via `buildRoots` in
      #    .scala-steward.conf. This action has no working-directory input, and
      #    `repo-config` supplies *default* values (for multi-repo repos-file
      #    runs) — Scala Steward already auto-reads .scala-steward.conf from the
      #    root of the repo it clones, and it is that copy which makes
      #    `buildRoots` take effect.
      #
      # 2. STEWARD_TOKEN, not the default GITHUB_TOKEN. PRs opened with
      #    GITHUB_TOKEN do not trigger further workflow runs, so ci.yml's
      #    `pull_request` job would never run on Steward's bump PRs — and since
      #    this build resolves pre-release artifacts (UPGRADE.md §3), those are
      #    exactly the PRs that need a compile + testFull gate.
      #
      #    STEWARD_TOKEN must be a fine-grained PAT scoped to this repository:
      #      Contents:      Read and write   (push the update branches)
      #      Pull requests: Read and write   (open the PRs)
      #
      #    It falls back to GITHUB_TOKEN if unset so the workflow still runs —
      #    but the PRs it opens will NOT be CI-gated. See UPGRADE.md §8.8.
      - name: Launch Scala Steward
        uses: scala-steward-org/scala-steward-action@v2
        with:
          github-token: ${{ secrets.STEWARD_TOKEN || secrets.GITHUB_TOKEN }}

name: Scala Steward

# Scala Steward opens PRs for dependency updates. This repo pins several
# pre-release artifacts (see UPGRADE.md); .scala-steward.conf keeps Steward
# from "helpfully" moving them onto lines that do not resolve under sbt 2.

on:
  schedule:
    # Mondays at 05:00 UTC
    - cron: '0 5 * * 1'
  workflow_dispatch:

jobs:
  scala-steward:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Launch Scala Steward
        uses: scala-steward-org/scala-steward-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repo-config: .scala-steward.conf
          # The sbt build lives in a subdirectory, not the repo root.
          working-directory: P4R-Type
